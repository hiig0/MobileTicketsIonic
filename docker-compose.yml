services:
  database:
    build:
      context: ./db
    container_name: ticket-database
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tickets_db}
      MYSQL_USER: ${MYSQL_USER:-ticket}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ticket}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ticket-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ticket-backend
    environment:
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-ticket}
      DB_PASSWORD: ${DB_PASSWORD:-ticket}
      DB_NAME: ${DB_NAME:-tickets_db}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  ticket-db-data: